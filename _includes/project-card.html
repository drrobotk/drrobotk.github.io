<article class="project-card">
  {% if include.project.category %}
  <span class="project-card-category">{{ include.project.category }}</span>
  {% endif %}
  
  <h3 class="project-card-title">
    <a href="{{ include.project.url | relative_url }}">{{ include.project.title }}</a>
  </h3>
  
  {% if include.project.description %}
  <p class="project-card-description">{{ include.project.description }}</p>
  {% endif %}
  
  {% if include.project.tech %}
  <div class="project-card-tech">
    {% for tech in include.project.tech %}
    <span class="tech-tag">{{ tech }}</span>
    {% endfor %}
  </div>
  {% endif %}
</article>
